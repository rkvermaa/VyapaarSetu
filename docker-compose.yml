version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vyapaarsetu_postgres
    environment:
      POSTGRES_USER: vyapaarsetu
      POSTGRES_PASSWORD: vyapaarsetu_dev
      POSTGRES_DB: vyapaarsetu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vyapaarsetu"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vyapaarsetu_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: vyapaarsetu_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
